name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/go
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: implementation/go/go.mod

      - name: Run tests
        run: go test ./... -v -count=1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/go
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: implementation/go/go.mod

      - name: Run golangci-lint
        env:
          GOLANGCI_LINT_VERSION: "2.11.4"
          GOLANGCI_LINT_SHA256: "200c5b7503f67b59a6743ccf32133026c174e272b930ee79aa2aa6f37aca7ef1"
        run: |
          set -euo pipefail
          archive="golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64.tar.gz"
          url="https://github.com/golangci/golangci-lint/releases/download/v${GOLANGCI_LINT_VERSION}/${archive}"
          curl -sSfL "$url" -o "${RUNNER_TEMP}/${archive}"
          echo "${GOLANGCI_LINT_SHA256}  ${RUNNER_TEMP}/${archive}" | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}"
          "${RUNNER_TEMP}/golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64/golangci-lint" run

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/go
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: implementation/go/go.mod

      - name: Build
        run: go build -o /dev/null ./cmd/cumasach
